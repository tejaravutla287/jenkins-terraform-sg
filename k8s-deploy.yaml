apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-html-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-html-app
  template:
    metadata:
      labels:
        app: my-html-app
    spec:
      containers:
      - name: nginx-container
        image: nginx:latest # Replace with your DockerHub image later if needed
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: html-service
spec:
  selector:
    app: my-html-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer # This creates the AWS Network Load Balancer
